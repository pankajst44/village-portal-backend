version: '3.8'

services:
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: village-portal-app
    ports:
      - "8080:8080"
    environment:
      # Connect to host MySQL (Windows: use host.docker.internal)
      - DATABASE_URL=jdbc:mysql://host.docker.internal:3306/village_portal?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=admin
      - JWT_SECRET=VillagePortalProductionSecretKey2026ChangeInRealProduction
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:8080
      - UPLOAD_DIR=/app/uploads
    extra_hosts:
      - "host.docker.internal=host-gateway"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - village-network

volumes:
  uploads:
    driver: local

networks:
  village-network:
    driver: bridge
