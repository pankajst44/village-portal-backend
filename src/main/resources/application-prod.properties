# ═══════════════════════════════════════════════════════════
# PRODUCTION CONFIGURATION (Railway / Cloud Deployment)
# ═══════════════════════════════════════════════════════════

# Server
server.port=${PORT:8080}

# ── DataSource ──
# Railway provides DATABASE_URL as mysql:// format, convert to jdbc:mysql://
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/village_portal?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ──
# MUST be set in environment variables for production!
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── File Storage ──
# Railway: Use persistent volume mount or S3
app.storage.upload-dir=${UPLOAD_DIR:/app/uploads}
app.storage.max-file-size-mb=10
app.storage.allowed-types=image/jpeg,image/png,image/jpg,application/pdf

# ── Multipart ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ── CORS ──
# Not needed when UI is served from same backend (static/)
# Only enable if you have a separate frontend domain
# app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ── Logging ──
logging.level.com.village.portal=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# ── Complaint OTP Settings ──
app.complaint.otp.expiry-minutes=10
app.complaint.otp.max-attempts=5

# ── Quartz Scheduler ──
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.overwrite-existing-jobs=true
spring.quartz.properties.org.quartz.scheduler.instanceName=VillagePortalScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=10000
spring.quartz.properties.org.quartz.threadPool.threadCount=3

# ── SMS Provider ──
app.sms.provider=${SMS_PROVIDER:log}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
