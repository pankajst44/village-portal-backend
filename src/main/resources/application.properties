
# Server
server.port=8080
server.servlet.context-path=/api

# ── DataSource ──
spring.datasource.url=jdbc:mysql://localhost:3306/village_portal?useSSL=false&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# ── JWT ──
app.jwt.secret=${JWT_SECRET:VillagePortalSecretKey2024ChangeThisInProduction!}
app.jwt.access-token-expiry-ms=1800000
app.jwt.refresh-token-expiry-ms=604800000

# ── File Storage ──
app.storage.upload-dir=${UPLOAD_DIR:./uploads}
app.storage.max-file-size-mb=10
app.storage.allowed-types=image/jpeg,image/png,image/jpg,application/pdf

# ── Multipart ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ── CORS ──
app.cors.allowed-origins=http://localhost:4200

# ── Logging ──
logging.level.com.village.portal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
