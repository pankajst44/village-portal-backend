
# Server
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/api

# ── DataSource ──
spring.datasource.url=jdbc:mysql://localhost:3306/village_portal?useSSL=false&serverTimezone=Asia/Kolkata&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# ── JWT ──
app.jwt.secret=${JWT_SECRET:VillagePortalSecretKey2024ChangeThisInProduction!}
#app.jwt.access-token-expiry-ms=1800000
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── File Storage ──
app.storage.upload-dir=${UPLOAD_DIR:./uploads}
app.storage.max-file-size-mb=10
app.storage.allowed-types=image/jpeg,image/png,image/jpg,application/pdf

# ── Multipart ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ── CORS ──
app.cors.allowed-origins=http://localhost:4200,http://192.168.29.49:4200

# ── Logging ──
logging.level.com.village.portal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ?? CMS ? OTP ????????????????????????????????????????????????
app.complaint.otp.expiry-minutes=10
app.complaint.otp.max-attempts=5

# ?? CMS ? Escalation scheduler ???????????????????????????????
app.complaint.escalation.cron=0 0 * * * *
app.complaint.autoclose.cron=0 0 2 * * *

# ?? Spring scheduling ?????????????????????????????????????????
spring.task.scheduling.pool.size=2

# ?? SMS Provider ??????????????????????????????????????????????
# Options:
#   log    ? print OTP to console only (default ? no setup needed)
#   twilio ? send real SMS via Twilio
app.sms.provider=log

# ?? Twilio credentials (only required when app.sms.provider=twilio) ??
# Get these from: https://console.twilio.com
# NEVER commit real values ? use environment variables in production:
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER}
