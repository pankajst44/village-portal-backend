# ── Quartz Cluster Configuration ─────────────────────────────
# All nodes share the same MySQL DB — Quartz uses QRTZ_* tables
# as a distributed lock to ensure only ONE node fires each job.

org.quartz.scheduler.instanceName=VillagePortalScheduler
org.quartz.scheduler.instanceId=AUTO          # unique per JVM instance automatically

# Thread pool
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount=3
org.quartz.threadPool.threadPriority=5

# JDBC job store — persists jobs/triggers to MySQL
org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
org.quartz.jobStore.tablePrefix=QRTZ_
org.quartz.jobStore.isClustered=true
org.quartz.jobStore.clusterCheckinInterval=10000   # nodes check in every 10s
org.quartz.jobStore.misfireThreshold=60000         # job is "misfired" if delayed > 60s
org.quartz.jobStore.dataSource=quartzDS

# DataSource — reuse same MySQL DB as the app
org.quartz.dataSource.quartzDS.driver=com.mysql.cj.jdbc.Driver
org.quartz.dataSource.quartzDS.URL=${spring.datasource.url}
org.quartz.dataSource.quartzDS.user=${spring.datasource.username}
org.quartz.dataSource.quartzDS.password=${spring.datasource.password}
org.quartz.dataSource.quartzDS.maxConnections=5
